name: PR Coverage Comment

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  coverage-comment:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Download coverage artifact
        uses: actions/download-artifact@v6
        with:
          name: coverage-report
          path: .local/build/ci
        continue-on-error: true
      - name: Post coverage delta
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let body = '## Coverage Report\n\n';
            try {
              const report = fs.readFileSync('.local/build/ci/coverage-production.txt', 'utf8');
              body += '```\n' + report.substring(0, 3000) + '\n```\n';
            } catch {
              body += 'Coverage data not available for this run.\n';
            }
            body += '\n---\n*Posted by CI coverage bot*';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => c.body.includes('Posted by CI coverage bot'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
