name: 5.7 Release CI

on:
  push:
    branches:
      - main
      - codex/stable-4.10
      - codex/stable-4.11
      - codex/stable-4.12
      - codex/stable-5.3
      - codex/stable-5.4
      - codex/stable-5.5
      - codex/stable-5.6
      - codex/stable-5.7
      - codex/feature/**
      - feature/**
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print toolchain versions
        run: |
          node --version
          corepack pnpm --version
          python3 --version

      - name: Contracts Lane
        run: ./scripts/ci.sh contracts

      - name: Upload contract artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: contracts-artifacts
          path: |
            packages/backend-contracts/generated/openapi.json
            packages/backend-contracts/generated/fixtures.json
          retention-days: 14

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install osv-scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Print toolchain versions
        run: |
          node --version
          corepack pnpm --version
          python3 --version

      - name: Backend Lane
        run: ./scripts/ci.sh backend

  ios:
    name: iOS
    runs-on: macos-26
    needs: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install ruff
        run: pip3 install ruff

      - name: Install CI shell tools
        run: |
          if ! brew list bash >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install bash
          fi
          if ! command -v rg >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ripgrep
          fi
          echo /opt/homebrew/bin >> "$GITHUB_PATH"

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint
          fi

      - name: Install SwiftFormat
        run: |
          if ! command -v swiftformat >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftformat
          fi

      - name: Print toolchain versions
        run: |
          bash --version | head -n 1
          rg --version | head -n 1
          xcodebuild -version
          swift --version
          python3 --version

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .local/build/ci/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('modules/native-chat/Package.swift', 'ios/GlassGPT.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: iOS Lane
        run: ./scripts/ci.sh ios

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-ci-artifacts
          path: |
            .local/build/ci/*.xcresult
            .local/build/ci/*.log
            .local/build/ci/*.txt
            .local/build/ci/*.json
          retention-days: 14

  release-readiness:
    name: Release Readiness
    runs-on: macos-26
    needs: [contracts, backend, ios]
    if: |
      always() &&
      needs.contracts.result == 'success' &&
      needs.backend.result == 'success' &&
      needs.ios.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install ruff
        run: pip3 install ruff

      - name: Install CI shell tools
        run: |
          if ! brew list bash >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install bash
          fi
          if ! command -v rg >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ripgrep
          fi
          echo /opt/homebrew/bin >> "$GITHUB_PATH"

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint
          fi

      - name: Install SwiftFormat
        run: |
          if ! command -v swiftformat >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftformat
          fi

      - name: Print toolchain versions
        run: |
          bash --version | head -n 1
          rg --version | head -n 1
          xcodebuild -version
          swift --version
          python3 --version

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .local/build/ci/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('modules/native-chat/Package.swift', 'ios/GlassGPT.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Release Readiness Lane
        run: ./scripts/ci.sh release-readiness
        env:
          RELEASE_SKIP_REQUIRED_UI_TESTS: '1'
          RELEASE_SKIP_REINSTALL_UI_TESTS: '1'
