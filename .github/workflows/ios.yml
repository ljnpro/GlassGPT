name: iOS

on:
  push:
    branches:
      - main
      - codex/stable-4.9
      - codex/feature/**
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
  EXPECTED_XCODE_VERSION: "26.3"
  EXPECTED_SWIFT_DRIVER_VERSION: "1.127.15"
  EXPECTED_PYTHON_VERSION: "3.14"

jobs:
  lint:
    name: Lint & Format
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.EXPECTED_PYTHON_VERSION }}

      - name: Install Python lint tools
        run: python3 -m pip install --upgrade pip ruff

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Print toolchain versions
        run: |
          python3 --version
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint
          fi

      - name: Install SwiftFormat
        run: |
          if ! command -v swiftformat >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftformat
          fi

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ripgrep
          fi

      - name: CI Health Gate
        run: ./scripts/ci.sh ci-health

      - name: Lint Gate
        run: ./scripts/ci.sh lint

      - name: Python Lint Gate
        run: ./scripts/ci.sh python-lint

      - name: Format Check Gate
        run: ./scripts/ci.sh format-check

  build:
    name: Build
    runs-on: macos-26
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.EXPECTED_PYTHON_VERSION }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Print toolchain versions
        run: |
          python3 --version
          xcodebuild -version
          swift --version

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .local/build/ci/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('modules/native-chat/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build Gate
        run: ./scripts/ci.sh build

  test:
    name: Tests
    runs-on: macos-26
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - gate: architecture-tests
          - gate: core-tests
          - gate: ui-tests
            ui_filter: "shard-1"
            ui-tests-shard: 1
          - gate: ui-tests
            ui_filter: "shard-2"
            ui-tests-shard: 2
          - gate: ui-tests
            ui_filter: "shard-3"
            ui-tests-shard: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.EXPECTED_PYTHON_VERSION }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Print toolchain versions
        run: |
          python3 --version
          xcodebuild -version
          swift --version

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .local/build/ci/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('modules/native-chat/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run ${{ matrix.gate }}
        run: ./scripts/ci.sh ${{ matrix.gate }}
        env:
          UI_TEST_FILTER: ${{ matrix.ui_filter || '' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.gate }}${{ matrix.ui-tests-shard && format('-shard-{0}', matrix.ui-tests-shard) || '' }}
          path: .local/build/ci/*.xcresult
          retention-days: 14

  quality:
    name: Quality Gates
    runs-on: macos-26
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.EXPECTED_PYTHON_VERSION }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Print toolchain versions
        run: |
          python3 --version
          xcodebuild -version
          swift --version

      - name: Maintainability Gate
        run: ./scripts/ci.sh maintainability

      - name: Source Share Gate
        run: ./scripts/ci.sh source-share

      - name: Infra Safety Gate
        run: ./scripts/ci.sh infra-safety

      - name: Module Boundary Gate
        run: ./scripts/ci.sh module-boundary

      - name: Doc Build Gate
        run: ./scripts/ci.sh doc-build

      - name: Doc Completeness Gate
        run: ./scripts/ci.sh doc-completeness

      - name: Localization Gate
        run: ./scripts/ci.sh localization-check

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: quality-reports
          path: |
            .local/build/ci/maintainability-report.txt
            .local/build/ci/source-share-report.txt
            .local/build/ci/infra-safety-report.txt
            .local/build/ci/module-boundary-report.txt
            .local/build/ci/doc-build-report.txt
            .local/build/ci/doc-completeness-report.txt
            .local/build/ci/localization-report.txt
          retention-days: 14

  release-readiness:
    name: Release Readiness
    runs-on: macos-26
    needs: [test, quality]
    if: github.ref == 'refs/heads/codex/stable-4.9' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.EXPECTED_PYTHON_VERSION }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Print toolchain versions
        run: |
          python3 --version
          xcodebuild -version
          swift --version

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .local/build/ci/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('modules/native-chat/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Release Readiness Gate
        run: ./scripts/ci.sh release-readiness
