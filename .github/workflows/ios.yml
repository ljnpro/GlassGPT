name: iOS

on:
  push:
    branches:
      - codex/stable-4.1
      - codex/stable-4.2
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app
        run: |
          xcodebuild \
            -project ios/GlassGPT.xcodeproj \
            -scheme GlassGPT \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Test package
        run: |
          xcodebuild \
            -project ios/GlassGPT.xcodeproj \
            -scheme GlassGPT \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            test
