name: iOS

on:
  push:
    branches:
      - main
      - codex/stable-4.1
      - codex/stable-4.2
      - codex/stable-4.3
      - codex/feature/**
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint
          fi

      - name: Lint Gate
        run: ./scripts/ci.sh lint

      - name: Build Gate
        run: ./scripts/ci.sh build

      - name: Core Tests Gate
        run: ./scripts/ci.sh core-tests

      - name: UI Tests Gate
        run: ./scripts/ci.sh ui-tests

      - name: Release Readiness Gate
        run: ./scripts/ci.sh
